{% extends 'base.html' %}

{% block sitetitle %}Tasks{% endblock %}

{% block content %}
<h1 class="title">To-Do List</h1>

<form method="POST" action="{{ url_for('add_task') }}">
    <input type="text" name="task" placeholder="Enter a task..." required>
    <button type="submit" class="btn_login">Add Task</button>
</form>

<ul>
    {% for task in tasks %}
        <li>
            {{ task[1] }}
            <a href="{{ url_for('delete_task', id=task[0]) }}">Delete</a>
        </li>
    {% endfor %}
</ul>

<a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
{% endblock %}
